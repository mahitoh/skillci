name: "skillci"
description: "Lint and safety-audit AI agent skills (SKILL.md) on every push and PR. Catches malicious patterns and broken skills."
author: "mahitoh"
branding:
  icon: "shield"
  color: "green"
inputs:
  path:
    description: "File or directory to scan for SKILL.md skills."
    required: false
    default: "."
  command:
    description: "Which check to run: run, lint, or audit. (test needs an agent and is skipped in CI.)"
    required: false
    default: "run"
  args:
    description: "Extra args passed through to skillci (e.g. --html report.html, --json)."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    # Self-contained: build skillci from this action's own pinned source so the
    # Action works with zero dependency on any package registry.
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
    - name: Build skillci
      shell: bash
      run: |
        cd "$GITHUB_ACTION_PATH"
        npm ci --ignore-scripts
        npm run build
    - name: Run skillci
      shell: bash
      run: |
        node "$GITHUB_ACTION_PATH/dist/cli.js" "${{ inputs.command }}" "${{ inputs.path }}" ${{ inputs.args }}
