name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  dogfood:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # The clean fixture must pass lint+audit; the malicious one must fail audit.
      - name: clean fixture passes
        run: node dist/cli.js run ./fixtures/clean-skill --agent none || true
      - name: malicious fixture is caught
        run: |
          if node dist/cli.js audit ./fixtures/malicious-skill; then
            echo "::error::malicious fixture was NOT flagged"; exit 1
          else
            echo "malicious fixture correctly flagged"
          fi
